name: Redis Build Sanity Schedule

on:
  workflow_dispatch:
    inputs:
      redisearch-refs:
        description: 'Comma-separated RediSearch refs. Empty uses workflow or repo defaults.'
        type: string
        default: ''
      platform:
        description: 'Platform filter passed to generate-matrix.yml'
        type: string
        default: all
      architecture:
        description: 'Architecture filter passed to generate-matrix.yml'
        type: choice
        options:
          - all
          - x86_64
          - aarch64
        default: all
      fail-fast:
        description: 'Stop matrix after the first failure'
        type: boolean
        default: false
  schedule:
    - cron: "50 22 * * *"

env:
  # Keep this to the version lines where Redis build sanity is expected after
  # backport. The repository variable can override it without a code change.
  DEFAULT_REDISEARCH_VERSION_REFS: 8.10,8.8,8.6-rse,8.6,8.4,8.2

jobs:
  prepare-refs:
    name: Prepare RediSearch refs
    runs-on: ubuntu-slim
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.refs.outputs.matrix }}
      has-jobs: ${{ steps.refs.outputs.has-jobs }}
    steps:
      - name: Prepare RediSearch refs
        id: refs
        shell: python
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          REDISEARCH_REFS: ${{ inputs.redisearch-refs || vars.REDIS_BUILD_SANITY_VERSION_REFS || env.DEFAULT_REDISEARCH_VERSION_REFS }}
        run: |
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          def parse_refs(raw):
              refs = []
              seen = set()
              for item in raw.replace("\n", ",").split(","):
                  ref = item.strip()
                  if not ref or ref in seen:
                      continue
                  refs.append(ref)
                  seen.add(ref)
              return refs

          def ref_has_backported_workflow(ref):
              path = ".github/workflows/task-redis-build-sanity.yml"
              repo = os.environ["GITHUB_REPOSITORY"]
              encoded_ref = urllib.parse.quote(ref, safe="")
              url = f"https://api.github.com/repos/{repo}/contents/{path}?ref={encoded_ref}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      return response.status == 200
              except urllib.error.HTTPError as error:
                  if error.code == 404:
                      return False
                  raise

          refs = parse_refs(os.environ["REDISEARCH_REFS"])
          matrix_items = []
          for ref in refs:
              if os.environ["EVENT_NAME"] == "schedule" and not ref_has_backported_workflow(ref):
                  print(f"Skipping {ref}: Redis build sanity workflow is not backported there yet")
                  continue
              matrix_items.append({"redisearch-ref": ref})

          with open(os.environ["GITHUB_OUTPUT"], "a") as output:
              print(f"matrix={json.dumps({'include': matrix_items})}", file=output)
              print(f"has-jobs={str(bool(matrix_items)).lower()}", file=output)

          if matrix_items:
              refs_for_log = ", ".join(item["redisearch-ref"] for item in matrix_items)
              print(f"Redis build sanity refs: {refs_for_log}")
          else:
              print("No RediSearch refs selected for Redis build sanity", file=sys.stderr)

  redis-build-sanity-version-refs:
    name: ${{ matrix.redisearch-ref }}
    needs: [prepare-refs]
    if: ${{ needs.prepare-refs.outputs.has-jobs == 'true' }}
    strategy:
      fail-fast: ${{ github.event_name == 'workflow_dispatch' && inputs.fail-fast || false }}
      max-parallel: 1
      matrix: ${{ fromJson(needs.prepare-refs.outputs.matrix) }}
    permissions:
      contents: read
    uses: ./.github/workflows/flow-redis-build-sanity.yml
    secrets: inherit
    with:
      platform: ${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'all' }}
      architecture: ${{ github.event_name == 'workflow_dispatch' && inputs.architecture || 'all' }}
      redisearch-repository: ${{ github.repository }}
      redisearch-ref: ${{ matrix.redisearch-ref }}
      fail-fast: ${{ github.event_name == 'workflow_dispatch' && inputs.fail-fast || false }}
