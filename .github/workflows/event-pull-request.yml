name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # =============================================================================
  # Main jobs (Rust + C++)
  # =============================================================================
  test:
    name: Run Tests
    uses: ./.github/workflows/task-test.yml
    secrets: inherit

  lint:
    name: Run Linting
    uses: ./.github/workflows/task-lint.yml
    secrets: inherit

  miri:
    name: Run Miri
    uses: ./.github/workflows/task-miri.yml
    secrets: inherit

  microbench:
    name: Run Micro Benchmarks
    if: contains(github.event.pull_request.labels.*.name, 'action:run-microbenchmark')
    uses: ./.github/workflows/task-microbench.yml
    secrets: inherit

  # =============================================================================
  # PR Validation (all jobs must pass)
  # =============================================================================
  pr-validation:
    needs:
      - lint
      # TODO: Re-enable once fixed:
      # - test: Flow tests fail due to SKIPINITIALSCAN not supported by Flex index (introduced in PR #74)
      # - miri: Miri tests failing - needs investigation
      - microbench
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    if: ${{ !cancelled() }}
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

