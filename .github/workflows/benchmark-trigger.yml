name: Benchmark

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]

jobs:
  perf-ci:
    name: Trigger Benchmarks
    if: >
      (
        github.event.action == 'labeled' &&
        github.event.label.name == 'action:run-benchmark'
      ) || (
        contains(fromJson('["opened", "reopened", "synchronize"]'), github.event.action) &&
        contains(github.event.pull_request.labels.*.name, 'action:run-benchmark')
      )
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.number }}-benchmark
      cancel-in-progress: true
    uses: ./.github/workflows/benchmark-runner.yml
    secrets: inherit

  # Micro-benchmark triggers are intentionally omitted in this repository for now.
  # To enable later, mirror RediSearch's flow-rust-micro-benchmarks.yml and flow-micro-benchmarks.yml
  # and add corresponding jobs here reacting to labels:
  #   - action:run-micro-benchmark
  #   - action:run-rust-micro-benchmark

