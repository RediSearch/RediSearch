name: Spellcheck

# Thin wrapper around the shared reusable spellcheck workflow, kept as a
# workflow_call entrypoint so existing callers
# (uses: ./.github/workflows/task-spellcheck.yml) don't change. The repo's
# .codespell/ config is still used (the shared workflow's default config path)
# and the base ref is resolved from the PR / merge-queue target.
on: [workflow_call]

jobs:
  spellcheck:
    uses: redislabsdev/redisearch-ci-common/.github/workflows/spellcheck.yml@5d3485c26571f609cec76dad6ad0b27bd1b1d0d7 # v1.0.1
