name: Backport merged pull request (Codex agent)

# Agent-driven counterpart of `task-backport_pr.yml`. The two flows are decoupled
# by label namespace so you can roll the agent flow forward or back without
# touching the existing `korthout/backport-action` path.
#
#   `backport <branch>`           -> handled by task-backport_pr.yml (korthout action)
#   `backport-<branch>-agent`     -> handled by this workflow (Codex agent)
#
# Trigger ways:
#   - PR is closed and merged with at least one `backport-<branch>-agent` label.
#   - A `backport-<branch>-agent` label is added to an already-merged PR.
#   - A repo collaborator/member/owner comments `/backport-agent` on a merged PR.
#       Optional args: `/backport-agent 8.6 8.2` overrides the labels for this run.
#       Only a target-branch list is accepted here (no free-form context): the
#       create step is mechanical, and keeping the trigger payload constrained
#       minimizes what a comment can feed the agent. The command intentionally
#       does not share the `/backport` prefix with the legacy
#       `task-backport_pr.yml` workflow.
#
# Behavior is defined by .github/codex/prompts/pr-backport-auto.md. This workflow
# only resolves inputs, writes a small context file, and invokes Codex.

on:
  pull_request_target:
    types: [closed, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

# Serialize per-PR so the `closed`, `labeled`, and `/backport-agent` triggers
# can't run concurrently against the same `backport-agent/pr-<n>-to-<branch>`
# branches and race on push / PR creation. Do not cancel an in-flight run — it
# may already have opened some target PRs.
concurrency:
  group: backport-agent-create-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  backport-agent:
    name: Auto-backport via Codex
    runs-on: ubuntu-slim
    timeout-minutes: 60

    # Fire when:
    #   * PR is closed and merged with at least one `backport-...-agent` label
    #     (the JSON-serialized labels-array check is a coarse pre-filter; the
    #     script step revalidates against `^backport-(.+)-agent$`).
    #   * A `backport-<branch>-agent`-style label is added to a merged PR.
    #   * A write-level user comments `/backport-agent` (and not the longer
    #     `/backport-agent-fix` / `/backport-agent-context` sibling commands,
    #     which belong to the fix workflow).
    #
    # The `author_association` allow-list (OWNER/MEMBER/COLLABORATOR) is required
    # because `!= 'NONE'` would also admit CONTRIBUTOR/FIRST_TIME_CONTRIBUTOR —
    # users who merged a prior PR but do not have repo write access.
    if: >
      (
        github.event_name == 'pull_request_target' &&
        github.event.action == 'closed' &&
        github.event.pull_request.merged &&
        contains(toJSON(github.event.pull_request.labels.*.name), '"backport-')
      ) || (
        github.event_name == 'pull_request_target' &&
        github.event.action == 'labeled' &&
        github.event.pull_request.merged &&
        startsWith(github.event.label.name, 'backport-') &&
        endsWith(github.event.label.name, '-agent')
      ) || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
        startsWith(github.event.comment.body, '/backport-agent') &&
        !startsWith(github.event.comment.body, '/backport-agent-')
      )

    steps:
      - name: 🔑 Generate GitHub App Token
        id: generate-app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GH_PR_APP_ID }}
          private-key: ${{ secrets.GH_PR_APP_PRIVATE_KEY }}
          owner: RediSearch
          # Hard-cap the minted token to exactly what this flow needs, so it
          # stays least-privilege even if the redis-pr-app App is granted more
          # at the installation level. Without these, the token inherits the
          # App's full installed permission set, not the `permissions:` block
          # above (which only governs the unused default GITHUB_TOKEN).
          permission-contents: write       # push backport-agent/* branches
          permission-pull-requests: write  # open / label / comment on PRs

      - name: Checkout master (with full history)
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-app-token.outputs.token }}
          # The agent cherry-picks from master onto release branches, so it
          # needs full history and access to all remote branches.
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "redis-pr-app[bot]"
          git config user.email "redis-pr-app[bot]@users.noreply.github.com"

      - name: Resolve PR context and target branches
        id: ctx
        env:
          GH_TOKEN: ${{ steps.generate-app-token.outputs.token }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          PR_NUMBER_FROM_PR: ${{ github.event.pull_request.number }}
          PR_NUMBER_FROM_ISSUE: ${{ github.event.issue.number }}
          LABEL_NAME: ${{ github.event.label.name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail

          # 1) Resolve PR number from whichever event we're handling.
          case "$EVENT_NAME" in
            pull_request_target) pr="$PR_NUMBER_FROM_PR" ;;
            issue_comment)       pr="$PR_NUMBER_FROM_ISSUE" ;;
            *) echo "Unhandled event: $EVENT_NAME"; exit 1 ;;
          esac

          # 2) Pull PR details and confirm it was actually merged. The label
          #    and comment triggers can fire on closed-but-not-merged PRs.
          #    `gh pr view --json` exposes `state` (one of OPEN/CLOSED/MERGED)
          #    and `mergedAt`; there is no boolean `merged` field, so use state.
          pr_data=$(gh pr view "$pr" --json title,mergeCommit,labels,state,url)
          state=$(jq -r '.state' <<<"$pr_data")
          if [ "$state" != "MERGED" ]; then
            echo "PR #$pr is not merged (state=$state); skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sha=$(jq -r '.mergeCommit.oid' <<<"$pr_data")
          title=$(jq -r '.title' <<<"$pr_data")
          url=$(jq -r '.url' <<<"$pr_data")

          # 3) Determine target branches.
          #    - issue_comment with args:   parse args from the comment first line
          #    - issue_comment, no args:    fall back to labels
          #    - pull_request_target labeled: just the one label that fired
          #    - pull_request_target closed:  all matching labels on the PR
          targets_json="[]"
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            args=$(printf '%s\n' "$COMMENT_BODY" | head -n1 | sed -E 's|^/backport-agent[[:space:]]*||')
            if [ -n "$args" ]; then
              # Use jq-only splitting on whitespace/comma. The previous
              # `tr | grep -v '^$' | jq` pipeline crashed under set -euo
              # pipefail when the args were separator-only (e.g.
              # `/backport-agent ,`) because grep matched nothing.
              targets_json=$(jq -nc --arg s "$args" \
                '[ $s | split("[\\s,]+"; "g") | .[] | select(length > 0) ]
                 | unique')
            fi
          elif [ "$EVENT_NAME" = "pull_request_target" ] && [ "$EVENT_ACTION" = "labeled" ]; then
            if [[ "$LABEL_NAME" =~ ^backport-(.+)-agent$ ]]; then
              targets_json=$(jq -nc --arg t "${BASH_REMATCH[1]}" '[$t]')
            fi
          fi

          if [ "$targets_json" = "[]" ]; then
            # Use jq-only filtering to avoid set -euo pipefail / grep-no-match
            # crashes on unlabeled PRs. The previous version piped jq->grep->sed,
            # which under pipefail aborted the script when grep produced no
            # output, so every merged PR without a `backport-*-agent` label
            # surfaced as a failed Actions run.
            targets_json=$(jq -c '
              [ .labels[].name
                | capture("^backport-(?<t>.+)-agent$")
                | .t ]
              | unique
            ' <<<"$pr_data")
          fi

          if [ "$targets_json" = "[]" ]; then
            echo "No backport-<branch>-agent targets resolved for PR #$pr; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 4) Persist context for the Codex agent to read. We write to
          #    $RUNNER_TEMP rather than the workspace so the agent's
          #    `git add -A` during cherry-pick conflict resolution can't
          #    stage the context JSON into the backport commit.
          context_file="${RUNNER_TEMP}/auto-backport-context.json"
          jq -nc \
            --argjson pr "$pr" \
            --arg sha "$sha" \
            --arg title "$title" \
            --arg url "$url" \
            --argjson targets "$targets_json" \
            '{pr: $pr, sha: $sha, title: $title, url: $url, targets: $targets}' \
            > "$context_file"

          echo "Resolved context (written to $context_file):"
          cat "$context_file"
          {
            echo "skip=false"
            echo "context_file=$context_file"
          } >> "$GITHUB_OUTPUT"

      - name: Run /pr-backport-auto via Codex
        if: steps.ctx.outputs.skip != 'true'
        uses: openai/codex-action@v1
        env:
          # The agent uses `gh` and `git push` — both need the App token. `gh`
          # picks it up from GH_TOKEN; the checkout step has already wired the
          # remote to use it for git operations.
          GH_TOKEN: ${{ steps.generate-app-token.outputs.token }}
          # The prompt reads this env var to find its context JSON. The file
          # lives in $RUNNER_TEMP rather than the workspace so it can never be
          # accidentally staged into a cherry-pick commit by `git add -A`.
          BACKPORT_CONTEXT_FILE: ${{ steps.ctx.outputs.context_file }}
        with:
          openai-api-key: ${{ secrets.OPEN_AI_BACKPORT_AGENT_KEY }}
          prompt-file: .github/codex/prompts/pr-backport-auto.md
          # Sandbox posture: keep the filesystem confined to the checkout
          # (`workspace-write`) and punch out only the one capability the agent
          # genuinely needs — outbound network for `git push` / `gh` — via the
          # codex `sandbox_workspace_write.network_access` config override. This
          # is far narrower than `danger-full-access`, which would also hand the
          # agent write access to the rest of the runner filesystem. The runners
          # are Linux (ubuntu-slim), whose Landlock sandbox honors this override
          # (the macOS Seatbelt caveat does not apply). `safety-strategy:
          # drop-sudo` is the action default and keeps the agent from escalating
          # privileges on the runner; `codex exec` is non-interactive, so no
          # approval prompts are involved regardless. The agent remains bounded
          # by:
          #   - the App token's scope (only this repo, only contents+PRs)
          #   - the prompt's guardrails (do not force-push, do not skip targets
          #     it can't resolve, etc.)
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: -c sandbox_workspace_write.network_access=true
