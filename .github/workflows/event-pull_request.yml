name: Pull Request Flow

# Documentation: https://redislabs.atlassian.net/wiki/spaces/DX/pages/3967844669/RediSearch+CI+refactor
#
# Each PR fans out into independent per-job-type pipelines (basic-test,
# coverage, sanitize). Each pipeline runs its own build and its own test jobs
# (unit + standalone flow + coordinator flow), so e.g. basic-test's tests
# never wait on the sanitize build. MIRI runs as its own top-level job —
# untethered from the build artifact since it can't reuse the nextest archive.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review] # Defaults + ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # TODO: revert to calling task-get-latest-tag.yml once Redis 8.10 is released.
  # Pinned to a redis/redis unstable commit (the redis/redis#15350 merge) because the module
  # requires RedisModule_GetClusterNodeSlotRanges (MOD-15868) and
  # RedisModuleEvent_ClusterTopologyChange (MOD-15870), neither of which is in any Redis release yet.
  get-latest-redis-tag:
    # uses: ./.github/workflows/task-get-latest-tag.yml
    # with:
    #   repo: redis/redis
    runs-on: ubuntu-slim
    outputs:
      tag: 8897348030c20bcd26841bc7d3ec7227f8187aeb
    steps:
      - run: echo "Using pinned redis/redis unstable commit instead of the latest release tag"

  check-what-changed:
    uses: ./.github/workflows/task-check-changes.yml

  lint:
    needs: check-what-changed
    if: ${{ needs.check-what-changed.outputs.CODE_CHANGED == 'true' }}
    permissions:
      contents: read
      packages: write
      id-token: write
      actions: write
    uses: ./.github/workflows/task-lint.yml
    secrets: inherit
    with:
      compare-advisories-to-base: true
      advisories-base-ref: ${{ github.event.pull_request.base.sha }}

  spellcheck:
    uses: ./.github/workflows/task-spellcheck.yml

  # ------------------------------------------------------------------
  # Per-job-type pipelines. Each runs its own build → test fan-out
  # independently of the others.
  # ------------------------------------------------------------------

  basic-test:
    needs: [check-what-changed, get-latest-redis-tag, spellcheck]
    if: ${{ (needs.check-what-changed.outputs.CODE_CHANGED == 'true' || needs.check-what-changed.outputs.TESTS_CHANGED == 'true' || contains(github.event.pull_request.labels.*.name, 'enforce:test')) && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    permissions:
      contents: read
      packages: write
      id-token: write
      actions: write
    uses: ./.github/workflows/flow-pr-pipeline.yml
    secrets: inherit
    with:
      job-type: basic-test
      platform: ubuntu:latest
      architecture: x86_64
      redis-ref: ${{ needs.get-latest-redis-tag.outputs.tag }}
      test-config: QUICK=1
      rejson-branch: master

  coverage:
    needs: [check-what-changed, get-latest-redis-tag, spellcheck]
    if: ${{ vars.ENABLE_CODE_COVERAGE != 'false' && ((!github.event.pull_request.draft && needs.check-what-changed.outputs.CODE_CHANGED == 'true') || (!github.event.pull_request.draft && needs.check-what-changed.outputs.TESTS_CHANGED == 'true') || contains(github.event.pull_request.labels.*.name, 'enforce:coverage')) && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    permissions:
      contents: read
      packages: write
      id-token: write
      actions: write
    uses: ./.github/workflows/flow-pr-pipeline.yml
    secrets: inherit
    with:
      job-type: coverage
      platform: ubuntu:latest
      architecture: x86_64
      redis-ref: ${{ needs.get-latest-redis-tag.outputs.tag }}
      test-config: QUICK=1
      rejson-branch: master

  sanitize:
    needs: [check-what-changed, get-latest-redis-tag, spellcheck]
    if: ${{ ((!github.event.pull_request.draft && needs.check-what-changed.outputs.CODE_CHANGED == 'true') || (!github.event.pull_request.draft && needs.check-what-changed.outputs.TESTS_CHANGED == 'true') || contains(github.event.pull_request.labels.*.name, 'enforce:sanitize')) && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    permissions:
      contents: read
      packages: write
      id-token: write
      actions: write
    uses: ./.github/workflows/flow-pr-pipeline.yml
    secrets: inherit
    with:
      job-type: sanitize
      platform: ubuntu:latest
      architecture: x86_64
      redis-ref: ${{ needs.get-latest-redis-tag.outputs.tag }}
      test-config: QUICK=1
      rejson-branch: master

  # ------------------------------------------------------------------
  # MIRI runs independently — no build artifact reuse possible, and we
  # don't want it gating the other test jobs.
  # ------------------------------------------------------------------

  miri:
    name: miri (${{ matrix.shard }}/3)
    needs: [check-what-changed, spellcheck]
    if: ${{ ((!github.event.pull_request.draft && needs.check-what-changed.outputs.CODE_CHANGED == 'true') || (!github.event.pull_request.draft && needs.check-what-changed.outputs.TESTS_CHANGED == 'true') || contains(github.event.pull_request.labels.*.name, 'enforce:sanitize')) && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    # Split MIRI across 3 nextest partitions. Each shard is self-contained
    # (builds the C side + compiles miri) since miri can't reuse the nextest
    # archive; the slow part — miri interpretation — is split 3 ways.
    strategy:
      matrix:
        shard: [1, 2, 3]
      fail-fast: false
    permissions:
      contents: read
      packages: write
      id-token: write
      actions: write
    uses: ./.github/workflows/task-miri.yml
    secrets: inherit
    with:
      platform: ubuntu:latest
      architecture: x86_64
      partition: count:${{ matrix.shard }}/3

  pr-validation:
    needs:
      - get-latest-redis-tag
      - check-what-changed
      - spellcheck
      - lint
      - basic-test
      - coverage
      - sanitize
      - miri
    runs-on: ubuntu-slim
    if: ${{ !cancelled() }}
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
