name: Detect Merge Queue Resubmission Without New Commits

on:
  merge_group:
    types: [checks_requested]

permissions:
  actions: read
  contents: read

jobs:
  detect-resubmit:
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Detect resubmission
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MERGE_GROUP_HEAD_REF: ${{ github.event.merge_group.head_ref }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: python scripts/detect_merge_queue_resubmit.py

      - name: Notify Slack about resubmission
        if: steps.detect.outputs.resubmit == 'true'
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_RQE_CI_ISSUES }}
        with:
          payload-file-path: ${{ steps.detect.outputs.payload_file }}
