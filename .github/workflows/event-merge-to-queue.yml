name: Merge a pull request
run-name: Validate ${{ github.ref_name }}

on:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  pr-validation:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4
      - name: Mock merge queue validation
        run: |
          if [ -f .github/mq-detector-test/slow-merge-queue ]; then
            sleep 120
          fi

          if [ -f .github/mq-detector-test/fail-merge-queue ]; then
            echo "Mock merge queue failure requested"
            exit 1
          fi

          echo "Mock merge queue validation passed"
