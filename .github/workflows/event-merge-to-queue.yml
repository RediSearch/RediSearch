name: Merge a pull request
run-name: Validate ${{ github.ref_name }}

on:
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.merge_group.head_commit.tree_id }}
  cancel-in-progress: true

jobs:
  pr-validation:
    name: Mock merge queue validation
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check mock merge queue marker
        run: |
          if [[ -f .github/mq-detector-test/fail-merge-queue ]]; then
            echo "Mock merge queue failure marker found"
            exit 1
          fi

          echo "Mock merge queue validation passed"
