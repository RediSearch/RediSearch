name: Merge a pull request
run-name: Validate ${{ github.ref_name }}

# Documentation: https://redislabs.atlassian.net/wiki/spaces/DX/pages/3967844669/RediSearch+CI+refactor

on:
  merge_group:
    types: [checks_requested]

concurrency:
  # This group identifies the PR by the tree ID of the head commit.
  # TODO: Replace with PR number of branch name once GH adds it to the event context
  group: ${{ github.workflow }}-${{ github.event.merge_group.head_commit.tree_id }}
  cancel-in-progress: true

jobs:
  get-latest-redis-tag:
    # TODO: Switch to the latest 8.8 release/pre-release line once it is ready.
    runs-on: ubuntu-slim
    outputs:
      tag: 3cd464263b03b425ffae2e23db24df3dc9346871
    steps:
      - run: echo "Dummy step to set output"
    # uses: ./.github/workflows/task-get-latest-tag.yml
    # with:
    #   repo: redis/redis

  lint:
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC role assumption for sccache S3 (used inside task-lint.yml)
      actions: write  # Swatinem/rust-cache read/write of GH cache (used inside task-lint.yml)
    uses: ./.github/workflows/task-lint.yml
    secrets: inherit
    with:
      compare-advisories-to-base: true
      advisories-base-ref: ${{ github.event.merge_group.base_sha }}

  test-matrix:
    # MQ is the 8.8 release gate, so run the full supported matrix with full tests.
    needs: [get-latest-redis-tag, lint]
    if: ${{ !cancelled() && !failure() }}
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC role assumption for sccache S3 (used inside task-test.yml)
      actions: write  # Swatinem/rust-cache read/write of GH cache (used inside task-test.yml)
    uses: ./.github/workflows/flow-test.yml
    secrets: inherit
    with:
      # macOS Intel (x86_64) test runners are excluded while the macOS runner
      # problem is mitigated; macOS ARM still runs.
      platform: all,!macos-14~x86_64,!macos-15~x86_64,!macos-26~x86_64
      architecture: all
      redis-ref: ${{ needs.get-latest-redis-tag.outputs.tag }}
      job-test-config: '{"test": "", "coverage": "", "sanitize": ""}'
      options: ${{ vars.ENABLE_CODE_COVERAGE != 'false' && 'unit-tests,coordinator,standalone,rejson,fail-fast,coverage,sanitize' || 'unit-tests,coordinator,standalone,rejson,fail-fast,sanitize' }}
      separate-coordinator-job: true
      rejson-branch: '8.8'

  pr-validation:
    needs:
      - get-latest-redis-tag
      - lint
      - test-matrix
    runs-on: ubuntu-slim
    if: ${{ !cancelled() }}
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
