name: Merge a pull request
run-name: Validate ${{ github.ref_name }}

# Documentation: https://redislabs.atlassian.net/wiki/spaces/DX/pages/3967844669/RediSearch+CI+refactor

on:
  merge_group:
    types: [checks_requested]

concurrency:
  # This group identifies the PR by the tree ID of the head commit.
  # TODO: Replace with PR number of branch name once GH adds it to the event context
  group: ${{ github.workflow }}-${{ github.event.merge_group.head_commit.tree_id }}
  cancel-in-progress: true

jobs:
  get-latest-redis-tag:
    uses: ./.github/workflows/task-get-latest-tag.yml
    with:
      repo: redis/redis

  lint:
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC role assumption for sccache S3 (used inside task-lint.yml)
      actions: write  # Swatinem/rust-cache read/write of GH cache (used inside task-lint.yml)
    uses: ./.github/workflows/task-lint.yml
    secrets: inherit
    with:
      compare-advisories-to-base: true
      advisories-base-ref: ${{ github.event.merge_group.base_sha }}

  build-unique-oses:
    needs: get-latest-redis-tag
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC role assumption for sccache S3 (used inside task-test.yml)
      actions: write  # Swatinem/rust-cache read/write of GH cache (used inside task-test.yml)
    uses: ./.github/workflows/flow-test.yml
    secrets: inherit
    with:
      platform: 'macos-26,alpine:3.23,intel'
      architecture: all
      # TODO: revert to `${{ needs.get-latest-redis-tag.outputs.tag }}` once Redis 8.10 is
      # released. Pinned to a redis/redis unstable commit because the module requires
      # RedisModule_GetClusterNodeSlotRanges (MOD-15868), which is not in any release yet.
      redis-ref: 3869512c920d4e865b54384bce5fcb6a4e06ae0d
      options: skip-tests,fail-fast
      rejson-branch: master

  test-ubuntu:
    # Always run tests for merge queue submissions, including text-only PRs.
    needs: get-latest-redis-tag
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC role assumption for sccache S3 (used inside task-test.yml)
      actions: write  # Swatinem/rust-cache read/write of GH cache (used inside task-test.yml)
    uses: ./.github/workflows/flow-test.yml
    secrets: inherit
    with:
      platform: ubuntu:noble
      architecture: x86_64
      # TODO: revert to `${{ needs.get-latest-redis-tag.outputs.tag }}` once Redis 8.10 is
      # released. Pinned to a redis/redis unstable commit because the module requires
      # RedisModule_GetClusterNodeSlotRanges (MOD-15868), which is not in any release yet.
      redis-ref: 3869512c920d4e865b54384bce5fcb6a4e06ae0d
      job-test-config: '{"test": "QUICK=1", "coverage": "QUICK=1", "sanitize": "QUICK=1"}'
      options: unit-tests,coordinator,standalone,rejson,fail-fast
      separate-coordinator-job: true
      rejson-branch: master

  pr-validation:
    needs:
      - get-latest-redis-tag
      - lint
      - build-unique-oses
      - test-ubuntu
    runs-on: ubuntu-slim
    if: ${{ !cancelled() }}
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
