name: Redis Build Sanity on Platforms

on:
  workflow_call:
    inputs:
      platform:
        type: string
        default: all
      architecture:
        type: string
        default: all
      redis-repository:
        description: 'Redis repository to use for the modernized build flow'
        type: string
        # TODO: Switch to redis/redis after https://github.com/redis/redis/pull/15253 lands.
        default: TalBarYakar/redis
      redis-ref:
        description: 'Redis ref containing modules-update/bootstrap/build/run'
        type: string
        default: tal.ba/feat/add_redis_docker_files
      redisearch-repository:
        description: 'RediSearch repository to inject into Redis modules.yaml. Defaults to this repository.'
        type: string
        default: ''
      redisearch-ref:
        description: 'RediSearch ref/SHA to inject into Redis modules.yaml. Defaults to this workflow SHA.'
        type: string
        default: ''
      fail-fast:
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      platform:
        type: choice
        options:
          - all
          - ubuntu:resolute
          - ubuntu:noble
          - ubuntu:jammy
          - ubuntu:focal
          - rockylinux:8
          - rockylinux:9
          - rockylinux:10
          - debian:bookworm
          - debian:trixie
          - amazonlinux:2023
          - azurelinux:3
          - alpine:3.23
          - macos-14
          - macos-15
          - macos-26
          - intel
        description: 'Platform to test on. Use "all" to test all supported platforms.'
        default: all
      architecture:
        type: choice
        options:
          - all
          - x86_64
          - aarch64
        description: 'Architecture to test on. Use "all" to test all supported architectures.'
        default: all
      redis-repository:
        description: 'Redis repository to use for the modernized build flow'
        type: string
        # TODO: Switch to redis/redis after https://github.com/redis/redis/pull/15253 lands.
        default: TalBarYakar/redis
      redis-ref:
        description: 'Redis ref containing modules-update/bootstrap/build/run'
        type: string
        default: tal.ba/feat/add_redis_docker_files
      redisearch-repository:
        description: 'RediSearch repository to inject into Redis modules.yaml. Empty means this repository.'
        type: string
        default: ''
      redisearch-ref:
        description: 'RediSearch ref/SHA to inject into Redis modules.yaml. Empty means this workflow SHA.'
        type: string
        default: ''
      fail-fast:
        description: 'Stop matrix after the first failure'
        type: boolean
        default: false

jobs:
  generate-matrix:
    uses: ./.github/workflows/generate-matrix.yml
    with:
      platform: ${{ inputs.platform }}
      architecture: ${{ inputs.architecture }}

  redis-build-sanity-matrix:
    name: ${{ matrix.platform }} (${{ matrix.architecture }})
    needs: [generate-matrix]
    if: ${{ needs.generate-matrix.outputs.has-jobs == 'true' }}
    strategy:
      fail-fast: ${{ inputs.fail-fast }}
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    permissions:
      contents: read
    uses: ./.github/workflows/task-redis-build-sanity.yml
    secrets: inherit
    with:
      platform: ${{ matrix.platform }}
      architecture: ${{ matrix.architecture }}
      redis-repository: ${{ inputs.redis-repository }}
      redis-ref: ${{ inputs.redis-ref }}
      redisearch-repository: ${{ inputs.redisearch-repository || github.repository }}
      redisearch-ref: ${{ inputs.redisearch-ref || github.sha }}
