    needs:
      - benchmark-search-oss-standalone
      - benchmark-search-oss-standalone-aarch64
      - benchmark-search-oss-standalone-threads-6
      - benchmark-vecsim-oss-standalone
      - benchmark-vecsim-oss-standalone-threads-6
