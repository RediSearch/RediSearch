name: Run RediSearchDisk Benchmarks

on:
  workflow_dispatch:
    inputs:
      extended:
        type: boolean
        description: 'Run extended benchmarks (cluster, larger matrices)'
        default: false
      profiler:
        type: boolean
        description: 'Run profiler on standalone benchmarks'
        default: false
      allowed_setup:
        type: string
        description: 'If empty allows all setups. If not, only triggers for a specific setup'
        default: ""
      rejson_branch:
        type: string
        default: master
        description: 'Branch to use for RedisJSON'
  workflow_call:
    inputs:
      extended:
        type: boolean
        default: false
      profiler:
        type: boolean
        default: false
      allowed_setup:
        type: string
        description: 'If empty allows all setups. If not, only triggers for a specific setup'
        default: ""
      notify_failure:
        type: boolean
        default: false
        description: 'If true, will notify failure on slack'

jobs:
  # Enabled now: rflex-standalone (Enterprise build but standalone topology with brute-force on shard (no `search.CLUSTERSET` command sent))
  benchmark-search-rflex-standalone:
    if: ${{ inputs.allowed_setup == '' || inputs.allowed_setup == 'oss-standalone' }}
    strategy:
      fail-fast: false
      matrix:
        member_id: [1, 2, 3]
    uses: ./.github/workflows/benchmark-flow.yml
    secrets: inherit
    with:
      benchmark_glob: "search*.yml"
      allowed_envs: oss-standalone
      allowed_setups: oss-standalone
      benchmark_runner_group_member_id: ${{ matrix.member_id }}
      benchmark_runner_group_total: ${{ strategy.job-total }}

  # The following jobs are included for future enablement but are currently not used in this repo.
  # Keep them disabled by conditions so they can be easily enabled later.

  benchmark-vecsim-oss-standalone:
    # Included for future use; disabled by default in this repo.
    if: ${{ (inputs.allowed_setup == '' || inputs.allowed_setup == 'oss-standalone') && false }}
    strategy:
      fail-fast: false
      matrix:
        member_id: [1, 2]
    uses: ./.github/workflows/benchmark-flow.yml
    secrets: inherit
    with:
      benchmark_glob: "vecsim*.yml"
      allowed_envs: oss-standalone
      allowed_setups: oss-standalone
      benchmark_runner_group_member_id: ${{ matrix.member_id }}
      benchmark_runner_group_total: ${{ strategy.job-total }}

  benchmark-search-oss-cluster-02-primaries:
    if: ${{ inputs.extended && (inputs.allowed_setup == '' || inputs.allowed_setup == 'oss-cluster-02-primaries') && false }}
    strategy:
      fail-fast: false
      matrix:
        member_id: [1, 2, 3]
    uses: ./.github/workflows/benchmark-flow.yml
    secrets: inherit
    with:
      benchmark_glob: "search*.yml"
      allowed_envs: oss-cluster
      allowed_setups: oss-cluster-02-primaries
      benchmark_runner_group_member_id: ${{ matrix.member_id }}
      benchmark_runner_group_total: ${{ strategy.job-total }}

  benchmark-search-oss-cluster-04-primaries:
    if: ${{ inputs.extended && (inputs.allowed_setup == '' || inputs.allowed_setup == 'oss-cluster-04-primaries') && false }}
    strategy:
      fail-fast: false
    
      matrix:
        member_id: [1, 2]
    uses: ./.github/workflows/benchmark-flow.yml
    secrets: inherit
    with:
      benchmark_glob: "search*.yml"
      allowed_envs: oss-cluster
      allowed_setups: oss-cluster-04-primaries
      benchmark_runner_group_member_id: ${{ matrix.member_id }}
      benchmark_runner_group_total: ${{ strategy.job-total }}

  benchmark-search-oss-cluster-08-primaries:
    if: ${{ inputs.extended && (inputs.allowed_setup == '' || inputs.allowed_setup == 'oss-cluster-08-primaries') && false }}
    strategy:
      fail-fast: false
      matrix:
        member_id: [1, 2, 3]
    uses: ./.github/workflows/benchmark-flow.yml
    secrets: inherit
    with:
      benchmark_glob: "search*.yml"
      allowed_envs: oss-cluster
      allowed_setups: oss-cluster-08-primaries
      benchmark_runner_group_member_id: ${{ matrix.member_id }}
      benchmark_runner_group_total: ${{ strategy.job-total }}

  benchmark-search-oss-cluster-16-primaries:
    if: ${{ inputs.extended && (inputs.allowed_setup == '' || inputs.allowed_setup == 'oss-cluster-16-primaries') && false }}
    strategy:
      fail-fast: false
      matrix:
        member_id: [1, 2, 3]
    uses: ./.github/workflows/benchmark-flow.yml
    secrets: inherit
    with:
      benchmark_glob: "search*.yml"
      allowed_envs: oss-cluster
      allowed_setups: oss-cluster-16-primaries
      benchmark_runner_group_member_id: ${{ matrix.member_id }}
      benchmark_runner_group_total: ${{ strategy.job-total }}

  benchmark-search-oss-cluster-20-primaries:
    if: ${{ inputs.extended && (inputs.allowed_setup == '' || inputs.allowed_setup == 'oss-cluster-20-primaries') && false }}
    strategy:
      fail-fast: false
      matrix:
        member_id: [1]
    uses: ./.github/workflows/benchmark-flow.yml
    secrets: inherit
    with:
      benchmark_glob: "search*.yml"
      allowed_envs: oss-cluster
      allowed_setups: oss-cluster-20-primaries
      benchmark_runner_group_member_id: ${{ matrix.member_id }}
      benchmark_runner_group_total: ${{ strategy.job-total }}

  benchmark-search-oss-cluster-24-primaries:
    if: ${{ inputs.extended && (inputs.allowed_setup == '' || inputs.allowed_setup == 'oss-cluster-24-primaries') && false }}
    strategy:
      fail-fast: false
      matrix:
        member_id: [1]
    uses: ./.github/workflows/benchmark-flow.yml
    secrets: inherit
    with:
      benchmark_glob: "search*.yml"
      allowed_envs: oss-cluster
      allowed_setups: oss-cluster-24-primaries
      benchmark_runner_group_member_id: ${{ matrix.member_id }}
      benchmark_runner_group_total: ${{ strategy.job-total }}

  # Profiler variants (disabled by default; enable by passing profiler=true)
  benchmark-search-oss-standalone-profiler:
    if: ${{ inputs.profiler && (inputs.allowed_setup == '' || inputs.allowed_setup == 'oss-standalone') && false }}
    strategy:
      fail-fast: false
      matrix:
        member_id: [1, 2, 3]
    uses: ./.github/workflows/benchmark-flow.yml
    secrets: inherit
    with:
      profile_env: 1
      triggering_env: "circleci.profilers"
      module_path: bin/linux-x64-release-profile/search-community/redisearch.so
      benchmark_glob: "search*.yml"
      allowed_envs: oss-standalone
      allowed_setups: oss-standalone
      benchmark_runner_group_member_id: ${{ matrix.member_id }}
      benchmark_runner_group_total: ${{ strategy.job-total }}

  notify-failure:
    if: false  # Currently always disabled. Re-enable when wanted.
    needs:
      - benchmark-search-rflex-standalone
      - benchmark-vecsim-oss-standalone
      - benchmark-search-oss-cluster-02-primaries
      - benchmark-search-oss-cluster-04-primaries
      - benchmark-search-oss-cluster-08-primaries
      - benchmark-search-oss-cluster-16-primaries
      - benchmark-search-oss-cluster-20-primaries
      - benchmark-search-oss-cluster-24-primaries
      - benchmark-search-oss-standalone-profiler
    if: ${{ failure() && inputs.notify_failure }}
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    steps:
      - name: Notify Failure
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "failed_workflow": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_BENCHMARK_FAILED }}

