name: temporary testing

on:
  workflow_dispatch:

jobs:
  slack-payload-test:
    name: Slack payload test (${{ matrix.case }})
    runs-on: ubuntu-slim
    strategy:
      fail-fast: false
      matrix:
        include:
          - case: valid-user-id
            author-mention-json: '"U02M4V63048"'
          - case: plain-string
            author-mention-json: '"redisearch-backport-pull-request"'
          - case: empty-string
            author-mention-json: '""'
          - case: null-value
            author-mention-json: 'null'
    steps:
      - name: Send Slack payload variant
        uses: slackapi/slack-github-action@v3
        with:
          errors: true
          webhook: ${{ secrets.SLACK_WEBHOOK_URL_RQE_CI_ISSUES }}
          webhook-type: webhook-trigger
          payload: |
            {
              "repository": "${{ github.repository }}",
              "PR": "https://github.com/RediSearch/RediSearch/pull/9682",
              "Title": "[temp] Slack payload mention test - ${{ matrix.case }}",
              "Author": "redisearch-backport-pull-request",
              "Author_Mention": ${{ matrix.author-mention-json }},
              "Reason": "payload_test",
              "Removed_At": "2026-05-18 00:00:00 UTC",
              "Resubmitted_At": "2026-05-18 00:01:00 UTC",
              "Removed_By": "github-merge-queue",
              "Enqueued_By": "GuyAv46",
              "Enqueued_By_Mention": "U02M4V63048",
              "Head_Commit": "https://github.com/RediSearch/RediSearch/commit/9ab417f79798ba1d86917b1aef1ef682845e9fca",
              "Head_Commit_SHA": "9ab417f79798ba1d86917b1aef1ef682845e9fca",
              "Head_Committed_At": "2026-05-17 14:58:46 UTC",
              "Workflow": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "Previous_Merge_Queue_Run": "https://github.com/RediSearch/RediSearch/actions/runs/25998716798",
              "Detector_Workflow": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
