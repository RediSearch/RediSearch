name: Deploy Master or Version Branch Snapshots

# Documentation: https://redislabs.atlassian.net/wiki/spaces/DX/pages/3967844669/RediSearch+CI+refactor

on:
  push:
    branches:
      - master
      - '[0-9]+.[0-9]+'

concurrency: # Global concurrency because newer runs should also cancel failure notification as it irrelevant
  group: snapshot-${{ github.ref_name }} # Snapshot guard for each branch
  cancel-in-progress: true # Cancel previous snapshot builds. Only the latest snapshot build will be kept.

jobs:
  deploy-snapshots:
    secrets: inherit
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/flow-build-artifacts.yml

  triage-failure:
    needs: deploy-snapshots
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      triage-exists: ${{ steps.triage.outputs.triage-exists }}
      triage-content-json: ${{ steps.triage.outputs.triage-content-json }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/fetch-failed-run-logs
        with:
          github-token: ${{ github.token }}
      - name: Run Codex triage
        id: triage
        uses: ./.github/actions/codex-ci-triage
        with:
          openai-api-key: ${{ secrets.CI_TRIAGE_OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/snapshot-triage.md

  notify-failure:
    needs: [deploy-snapshots, triage-failure]
    if: failure()
    runs-on: ubuntu-slim
    steps:
      - name: Notify Failure
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL_SNAPSHOT_FAILED }}
          webhook-type: webhook-trigger
          errors: true  # fail step on Slack delivery errors; v3 default silently retries
          payload: |
            {
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "workflow_page": "${{ github.server_url }}/${{ github.repository }}/actions/workflows/event-deploy-snapshots.yml/?query=branch%3A${{ github.ref_name }}",
              "failed_workflow": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}",
              "ai_triage": ${{ needs.triage-failure.outputs.triage-exists == 'true' && needs.triage-failure.outputs.triage-content-json || '""' }}
            }
