name: Build under distro toolchain (ce-testing parity)

# Mirrors the environment ce-testing's Debian packaging pipeline (sbuild +
# dpkg-buildpackage) exercises:
#   * CC=gcc (not clang)
#   * distro `libclang-N-dev` for bindgen, but NOT the `clang-N` binary
#     (sbuild chroots only install Build-Depends; redis-debian's debian/control
#     pulls libclang for bindgen and uses gcc to compile)
#   * CFLAGS/CPPFLAGS/LDFLAGS from `dpkg-buildflags` with hardening=+all,
#     matching redis-debian's debian/rules
# and runs the full `./build.sh` so we surface any failure ce-testing would —
# bindgen parse errors, hardening-flag breakage, missing distro packages, etc.
#
# Our regular CI installs a pinned LLVM via `.install/install_llvm.sh`, which
# hides this class of failure. This workflow intentionally shims that script
# out so we exercise the stock distro toolchain.

on:
  pull_request:
    paths:
      - 'src/**'
      - 'deps/**'
      - 'CMakeLists.txt'
      - 'build.sh'
      - '.install/**'
      - '.github/workflows/ffi-bindgen-distro.yml'
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  distro-build:
    name: build (${{ matrix.distro }}, libclang-${{ matrix.libclang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: jammy
            libclang: 14
            image: ubuntu:22.04
          - distro: noble
            libclang: 18
            image: ubuntu:24.04
    container:
      image: ${{ matrix.image }}
    defaults:
      run:
        # GitHub Actions defaults to `sh -e {0}` inside containers, which
        # rejects `set -o pipefail`. Ubuntu images ship bash by default; force
        # it so the standard `set -euxo pipefail` below behaves as expected.
        shell: bash
    steps:
      - name: Bootstrap container
        run: |
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates git curl dpkg-dev sudo
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Shim install_llvm.sh to use distro libclang only
        # Replace the pinned-LLVM installer with a stub that pulls just the
        # distro `libclang-N-dev` package — no `clang-N` binary, no apt.llvm.org.
        # This is what ce-testing's sbuild chroot has: bindgen finds libclang
        # but the C compiler is gcc.
        run: |
          set -euxo pipefail
          cat > .install/install_llvm.sh <<EOF
          #!/usr/bin/env bash
          # Shimmed by .github/workflows/ffi-bindgen-distro.yml — install only
          # the distro libclang dev package, matching ce-testing's chroot.
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          MODE="\${1:-}"
          \$MODE apt-get install -y --no-install-recommends libclang-${{ matrix.libclang }}-dev
          EOF
          chmod +x .install/install_llvm.sh
      - name: Install dependencies (distro toolchain only)
        working-directory: .install
        run: ./install_script.sh
      - name: Configure environment (gcc + dpkg-buildflags hardening)
        run: |
          set -euxo pipefail
          # Mirror redis-debian/debian/rules: CC=gcc, hardening=+all.
          export DEB_BUILD_MAINT_OPTIONS="hardening=+all"
          {
            echo "CC=gcc"
            echo "CFLAGS=$(dpkg-buildflags --get CFLAGS)"
            echo "CPPFLAGS=$(dpkg-buildflags --get CPPFLAGS)"
            echo "LDFLAGS=$(dpkg-buildflags --get LDFLAGS) -ldl -latomic"
            echo "LIBCLANG_PATH=/usr/lib/llvm-${{ matrix.libclang }}/lib"
          } >> "$GITHUB_ENV"
      - name: Show toolchain
        run: |
          set -euxo pipefail
          gcc --version
          ls "$LIBCLANG_PATH" 2>/dev/null | grep -i clang | head -5 || true
          which clang && echo "WARNING: clang binary present (chroot parity broken)" || \
            echo "no clang binary (expected — ce-testing parity)"
          "$HOME/.cargo/bin/rustc" --version
          "$HOME/.cargo/bin/cargo" --version
          echo "CC=$CC"
          echo "CFLAGS=$CFLAGS"
          echo "CPPFLAGS=$CPPFLAGS"
          echo "LDFLAGS=$LDFLAGS"
      - name: Build (./build.sh)
        run: ./build.sh
