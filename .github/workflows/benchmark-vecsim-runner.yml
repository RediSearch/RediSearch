# EC2 runner lifecycle workflow for disk-based HNSW benchmarks (vecsim_disk)
# Following VectorSimilarity's benchmark-runner.yml pattern
name: Benchmark VecSim Runner

on:
  workflow_call:
    inputs:
      architecture:
        required: true
        type: string
      instance-type:
        required: true
        type: string
      ami-id:
        required: true
        type: string

jobs:
  start-runner:
    name: Start self-hosted EC2 runner
    runs-on: ubuntu-latest
    outputs:
      runner_label: ${{ steps.start-ec2-runner.outputs.label }}
      ec2_instance_id: ${{ steps.start-ec2-runner.outputs.ec2-instance-id }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.PERFORMANCE_EC2_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.PERFORMANCE_EC2_SECRET_KEY }}
          aws-region: ${{ secrets.PERFORMANCE_EC2_REGION }}
      - name: Start EC2 runner
        id: start-ec2-runner
        uses: machulav/ec2-github-runner@v2.4.2
        with:
          mode: start
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          ec2-image-id: ${{ inputs.ami-id }}
          ec2-instance-type: ${{ inputs.instance-type }}
          subnet-id: ${{ secrets.PERFORMANCE_EC2_SUBNET_ID }}
          security-group-id: ${{ secrets.PERFORMANCE_EC2_SG_ID }}
          ec2-volume-size: 64

  benchmark:
    name: Run benchmarks on runner
    needs: start-runner
    runs-on: ${{ needs.start-runner.outputs.runner_label }}
    steps:
      - name: Pre checkout deps
        run: sudo apt-get update && sudo apt-get -y install git

      # Generate repo App token for private submodules
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_CI_APP_ID }}
          private-key: ${{ secrets.GH_CI_PRIVATE_KEY }}
          owner: redislabsdev
          repositories: |
            Redis
            RediSearchEnterprise
            rust-speedb
            speedb-ent
            redismodule-rs

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      # Configure Git/Cargo to authenticate with private repos using the app token
      - name: Configure Git for private Cargo dependencies
        uses: ./.github/actions/configure-cargo-auth
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Print runner info
        run: |
          printf "Runner lscpu:\n$(lscpu)\n"
          printf "Runner lsmem:\n$(lsmem)\n"
          printf "Runner nproc:\n$(nproc)\n"
          printf "Runner uname:\n$(uname -a)\n"
          printf "Runner arch:\n$(arch)\n"

      - name: Install benchmark dependencies
        run: |
          export HOME="${HOME:-/home/ubuntu}"
          ./.install/install_benchmark_deps.sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Download datasets
        timeout-minutes: 20
        run: ./vecsim_disk/benchmarks/bm_datasets_disk.sh

      - name: Run Benchmark
        env:
          ARCH: ${{ inputs.architecture }}
        timeout-minutes: 300
        run: |
          export HOME="${HOME:-/home/ubuntu}"
          export PATH="$HOME/.cargo/bin:$PATH"
          # Run all benchmarks (each outputs to {name}_results.json)
          ./build.sh bench-vecsim

      - name: Collect results
        run: |
          ./vecsim_disk/benchmarks/benchmarks_disk.sh | xargs -P 0 -I {} redisbench-admin export \
            --redistimeseries_host ${{ secrets.PERFORMANCE_RTS_HOST }} \
            --redistimeseries_port ${{ secrets.PERFORMANCE_RTS_PORT }} \
            --redistimeseries_user default \
            --redistimeseries_pass '${{ secrets.PERFORMANCE_RTS_AUTH }}' \
            --github_repo ${{ github.event.repository.name }} \
            --github_org ${{ github.repository_owner }} \
            --github_branch ${{ github.head_ref || github.ref_name }} \
            --github_actor ${{ github.triggering_actor }} \
            --architecture ${{ inputs.architecture }} \
            --results-format google.benchmark \
            --benchmark-result-file {}_results.json

  stop-runner:
    name: Stop self-hosted EC2 runner
    needs:
      - start-runner
      - benchmark
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.PERFORMANCE_EC2_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.PERFORMANCE_EC2_SECRET_KEY }}
          aws-region: ${{ secrets.PERFORMANCE_EC2_REGION }}
      - name: Stop EC2 runner
        uses: machulav/ec2-github-runner@v2.4.2
        with:
          mode: stop
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          label: ${{ needs.start-runner.outputs.runner_label }}
          ec2-instance-id: ${{ needs.start-runner.outputs.ec2_instance_id }}

