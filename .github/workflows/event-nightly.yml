name: Nightly Flow

# Documentation: https://redislabs.atlassian.net/wiki/spaces/DX/pages/3967844669/RediSearch+CI+refactor

on:
  workflow_dispatch:
  schedule:
    - cron: "20 20 * * *"

jobs:
  lint:
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC role assumption for sccache S3 (used inside task-lint.yml)
      actions: write  # Swatinem/rust-cache read/write of GH cache (used inside task-lint.yml)
    uses: ./.github/workflows/task-lint.yml
    secrets: inherit

  test-all-platforms:
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC role assumption for sccache S3 (used inside task-test.yml)
      actions: write  # Swatinem/rust-cache read/write of GH cache (used inside task-test.yml)
    uses: ./.github/workflows/flow-test.yml
    secrets: inherit
    with:
      platform: all
      architecture: all
      # Track unstable so nightly catches upstream Redis breakage; PR/merge
      # CI uses the latest release.
      redis-ref: unstable
      job-test-config: '{"test": "", "coverage": "", "sanitize": ""}'
      options: ${{ vars.ENABLE_CODE_COVERAGE != 'false' && 'unit-tests,coordinator,standalone,rejson,coverage,sanitize' || 'unit-tests,coordinator,standalone,rejson,sanitize' }}
      rejson-branch: master

  micro-benchmarks:
    permissions:
      contents: read
      id-token: write # OIDC role assumption for sccache S3 (used inside flow-micro-benchmarks-runner.yml)
    uses: ./.github/workflows/flow-micro-benchmarks.yml
    secrets: inherit

  redis-build-sanity:
    permissions:
      contents: read
    uses: ./.github/workflows/flow-redis-build-sanity.yml
    secrets: inherit
    with:
      platform: all,ubuntu:latest
      architecture: all
      redis-repository: redis/redis
      redis-ref: unstable
      redisearch-repository: ${{ github.repository }}
      redisearch-ref: ${{ github.sha }}

  notify-failure:
    needs: [lint, test-all-platforms, micro-benchmarks, redis-build-sanity]
    if: failure()
    runs-on: ubuntu-slim
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Triage only needs the local workflow/action files. Codex then reads
          # untrusted CI logs and emits external output, so don't leave a usable
          # git credential available to later steps.
          persist-credentials: false

      - name: Collect failure context
        id: failure-context
        uses: ./.github/actions/ci-failure-context

      - name: Run Codex triage
        id: ai_triage
        uses: ./.github/actions/codex-ci-triage
        with:
          openai-api-key: ${{ secrets.CI_TRIAGE_OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/nightly-triage.md

      - name: Notify Failure
        if: always()
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL_NIGHTLY_FAILED }}
          webhook-type: webhook-trigger
          errors: true  # fail step on Slack delivery errors; v3 default silently retries
          payload: |
            {
              "failed_workflow": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}",
              "repository": "${{ github.repository }}",
              "failed_jobs": ${{ toJson(steps.failure-context.outputs.failed-jobs) }},
              "ai_triage": ${{ steps.ai_triage.outputs.triage-exists == 'true' && steps.ai_triage.outputs.triage-content-json || '""' }}
            }
