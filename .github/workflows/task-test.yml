name: Test

on:
  workflow_call:

jobs:
  ci:
    name: Test on Ubuntu with Redis-Flex
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    defaults:
      run:
        shell: bash -l -eo pipefail {0}
    permissions:
      contents: read
    steps:
      # Generate repo App token
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_CI_APP_ID }}
          private-key: ${{ secrets.GH_CI_PRIVATE_KEY }}
          owner: redislabsdev
          repositories: |
            Redis
            RediSearchDisk
            rust-speedb
            speedb-ent

      # Full checkout, with the above token for private repos (and current)
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      # Setup build environment (dependencies, disk space, sccache)
      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          install-mode: sudo

      # Install Python test dependencies early
      - name: Install Python test dependencies
        working-directory: flow-tests
        run: |
          python3 -m pip install --break-system-packages -e .

      # Setup Redis (checkout, build, cache)
      - name: Setup Redis
        uses: ./.github/actions/setup-redis
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          install-mode: sudo
          checkout-path: Redis

      # Build the module
      - name: Build
        run: PROFILE=Debug ./build.sh build

      # Run Rust unit tests
      - name: Test (Rust unit tests)
        run: PROFILE=Debug ./build.sh test

      # Run C++ unit tests
      - name: Test (C++ unit tests)
        run: PROFILE=Debug ./build.sh test-vecsim

      # Run integration tests with RLTest
      # Set LD_LIBRARY_PATH so Redis can find libspeedb.so.2
      - name: Test (Integration tests with RLTest)
        working-directory: flow-tests
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/build/speedb-build:${{ env.LD_LIBRARY_PATH }}
        run: |
          python3 runtests.py --module ../build/redisearch.so --redis-lib-path /usr/local/lib --parallel

      # Show sccache statistics
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      # Upload test logs if tests fail
      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: flow-tests/logs/
          retention-days: 7
