# Executes the actual benchmark work - builds RediSearchDisk module, sets up Redis infrastructure,
# runs redisbench-admin on AWS, and generates performance comparison reports for PRs. This is the
# reusable workflow that does the heavy lifting for each benchmark configuration.
name: Run a Benchmark Flow (RediSearchDisk)

on:
  workflow_call:
    inputs:
      module_path:
        type: string
        default: build/redisearch.so
      rejson_branch:
        type: string
        default: master
      rejson_module_path:
        type: string
        default: bin/linux-x64-release/RedisJSON/master/rejson.so
      profile_env:
        type: number
      enable_profiler:
        type: string
        default: "false"
      benchmark_glob:
        type: string
        default: "search*.yml"
      triggering_env:
        type: string
        # Keep CircleCI naming for now to align Grafana dashboards; can move to github-actions later
        default: "circleci"
      allowed_envs:
        type: string
        default: "oss-standalone"
      allowed_setups:
        type: string
        default: "oss-standalone"
      benchmark_runner_group_member_id:
        type: number
        default: 1
      benchmark_runner_group_total:
        type: number
        default: 1

jobs:
  benchmark-steps:
    name: "Benchmark rflex-standalone profiler=${{ inputs.enable_profiler }} (${{ inputs.benchmark_runner_group_member_id }}/${{ inputs.benchmark_runner_group_total }}) filter=${{ inputs.benchmark_glob }}"
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash -l -eo pipefail {0}
    permissions:
      contents: read
    steps:
      # Generate repo App token
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_CI_APP_ID }}
          private-key: ${{ secrets.GH_CI_PRIVATE_KEY }}
          owner: redislabsdev
          repositories: |
            Redis
            RediSearchDisk
            rust-speedb
            speedb-ent
            redismodule-rs

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PERFORMANCE_EC2_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.PERFORMANCE_EC2_SECRET_KEY }}
          aws-region: ${{ secrets.PERFORMANCE_EC2_REGION }}

      - name: Ensure perf key exists and has correct permissions
        run: |
          # Ensure perf key exists and has correct permissions
          PEM_FILE="/tmp/benchmarks.redislabs.pem"
          if [ ! -f "$PEM_FILE" ]; then
            echo "Private key not found, retrieving from AWS Secrets Manager..."
            aws secretsmanager get-secret-value \
              --secret-id perf-cto-us-east-2 \
              --query SecretString \
              --output text > "$PEM_FILE"
          fi
          chmod 400 "$PEM_FILE"
          ls -la "$PEM_FILE"

      # Full checkout (submodules) similar to RS
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      # Setup build environment (dependencies, disk space, sccache, cargo auth)
      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          install-mode: sudo
          install-python-deps: 'true'
          python-requirements-file: deps/RediSearch/tests/benchmarks/requirements.txt
          github-token: ${{ steps.app-token.outputs.token }}

      # Install latest without pin, to avoid the back-and-forth of releasing new redisbench-admin and needing a PR
      - name: Install latest redisbench-admin
        run: |
          pip install --upgrade pip
          pip install -U redisbench-admin

      - name: Build RediSearchDisk module
        run: PROFILE=Release ./build.sh build

      # Setup Redis (checkout, build, cache)
      - name: Setup Redis
        uses: ./.github/actions/setup-redis
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          install-mode: sudo
          checkout-path: redis

      # Show sccache statistics
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.11.1
          terraform_wrapper: false

      - name: Prepare RedisJSON Module
        run: REJSON_BRANCH=${{ inputs.rejson_branch }} ./deps/RediSearch/tests/deps/setup_rejson.sh

      - name: Run CI benchmarks on aws for envs ${{ inputs.allowed_envs }}
        timeout-minutes: 480
        working-directory: benchmarks
        env:
          TF_VAR_parca_agent_token: ${{ secrets.TF_VAR_parca_agent_token }}
          TF_VAR_enable_parca_agent: ${{ inputs.enable_profiler }}
          AWS_ACCESS_KEY_ID: ${{ secrets.PERFORMANCE_EC2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PERFORMANCE_EC2_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.PERFORMANCE_EC2_REGION }}
          EC2_PRIVATE_PEM: ${{ secrets.PERFORMANCE_EC2_PRIVATE_PEM }}
          PROFILE: ${{ inputs.profile_env }}
          BENCHMARK_GLOB: ${{ inputs.benchmark_glob }}
          BENCHMARK_RUNNER_GROUP_M_ID: ${{ inputs.benchmark_runner_group_member_id }}
          BENCHMARK_RUNNER_GROUP_TOTAL: ${{ inputs.benchmark_runner_group_total }}
          SEARCH_MEMORY_ENABLED: 1
          REDIS_SERVER_BINARY: /usr/local/bin/redis-server
          MODULE_PATH: ${{ inputs.module_path }}
          REJSON_MODULE_PATH: ${{ inputs.rejson_module_path }}
          GITHUB_ACTOR_NAME: ${{ github.triggering_actor }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_ORG_NAME: ${{ github.repository_owner }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          TRIGGERING_ENV: ${{ inputs.triggering_env }}
          ALLOWED_ENVS: ${{ inputs.allowed_envs }}
          ALLOWED_SETUPS: ${{ inputs.allowed_setups }}
          REDISTIMESERIES_HOST: ${{ secrets.PERFORMANCE_RTS_HOST }}
          REDISTIMESERIES_PORT: ${{ secrets.PERFORMANCE_RTS_PORT }}
          REDISTIMESERIES_PASS: ${{ secrets.PERFORMANCE_RTS_AUTH }}
          LD_LIBRARY_PATH_VALUE: /tmp
          REMOTE_SYMLINK: /tmp/libspeedb.so.2.6.2:/tmp/libspeedb.so.2
          LIB_SPEEDB: ../build/speedb-build/libspeedb.so.2.6.2
          LIB_BS_SPEEDB: /usr/local/lib/bs_speedb.so
          BIGREDIS_ENABLED: 1
          BIGREDIS_USE_ASYNC: "no"
          BIGREDIS_MAX_RAM: "4GB"
          SEARCH_CLUSTERSET: 1
          CLUSTER_NODE_TIMEOUT: 240000
          DB_DIRNAME: "/mnt/flash"

        run: redisbench-admin run-remote
              --redis-server-binary "${REDIS_SERVER_BINARY}"
              --module_path "../${MODULE_PATH}"
              --module_path "../${REJSON_MODULE_PATH}"
              --extra_lib "${LIB_SPEEDB}"
              --extra_lib "${LIB_BS_SPEEDB}"
              --required-module search
              --github_actor "${GITHUB_ACTOR_NAME}"
              --github_repo "${GITHUB_REPO_NAME}"
              --github_org "${GITHUB_ORG_NAME}"
              --required-module ReJSON
              --github_sha "${GITHUB_SHA_VALUE}"
              --github_branch "${GITHUB_BRANCH_NAME}"
              --upload_results_s3
              --triggering_env "${TRIGGERING_ENV}"
              --allowed-envs "${ALLOWED_ENVS}"
              --allowed-setups "${ALLOWED_SETUPS}"
              --push_results_redistimeseries
              --redistimeseries_host "${REDISTIMESERIES_HOST}"
              --redistimeseries_port "${REDISTIMESERIES_PORT}"
              --redistimeseries_pass "${REDISTIMESERIES_PASS}"
              --collect_search_memory True
              --ld_library_path "${LD_LIBRARY_PATH_VALUE}"
              --remote_symlink "${REMOTE_SYMLINK}"

      - name: Generate Pull Request Performance info
        if: github.event.number
        env:
          PERFORMANCE_GH_TOKEN: ${{ secrets.PERFORMANCE_GH_TOKEN }}
          PERFORMANCE_WH_TOKEN: ${{ secrets.PERFORMANCE_WH_TOKEN }}
          COMPARISON_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
          BASELINE_BRANCH: ${{ github.event.pull_request.base.ref }}
          PULL_REQUEST_NUMBER: ${{ github.event.number }}
          REDISTIMESERIES_HOST: ${{ secrets.PERFORMANCE_RTS_HOST }}
          REDISTIMESERIES_PORT: ${{ secrets.PERFORMANCE_RTS_PORT }}
          REDISTIMESERIES_PASS: ${{ secrets.PERFORMANCE_RTS_AUTH }}

        run: redisbench-admin compare
              --defaults_filename ./benchmarks/defaults.yml
              --comparison-branch "${COMPARISON_BRANCH}"
              --baseline-branch "${BASELINE_BRANCH}"
              --auto-approve
              --pull-request "${PULL_REQUEST_NUMBER}"
              --redistimeseries_host "${REDISTIMESERIES_HOST}"
              --redistimeseries_port "${REDISTIMESERIES_PORT}"
              --redistimeseries_pass "${REDISTIMESERIES_PASS}"
