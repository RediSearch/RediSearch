# Executes the actual benchmark work - builds RediSearchDisk module, sets up Redis infrastructure,
# runs redisbench-admin on AWS, and generates performance comparison reports for PRs. This is the
# reusable workflow that does the heavy lifting for each benchmark configuration.
name: Run a Benchmark Flow (RediSearchDisk)

on:
  workflow_call:
    inputs:
      module_path:
        type: string
        default: build/redisearch.so
      rejson_branch:
        type: string
        default: master
      rejson_module_path:
        type: string
        default: bin/linux-x64-release/RedisJSON/master/rejson.so
      profile_env:
        type: number
      benchmark_glob:
        type: string
        default: "search*.yml"
      triggering_env:
        type: string
        # Keep CircleCI naming for now to align Grafana dashboards; can move to github-actions later
        default: "circleci"
      allowed_envs:
        type: string
        default: "oss-standalone"
      allowed_setups:
        type: string
        default: "oss-standalone"
      benchmark_runner_group_member_id:
        type: number
        default: 1
      benchmark_runner_group_total:
        type: number
        default: 1

jobs:
  benchmark-steps:
    name: "Benchmark rflex-standalone (${{ inputs.benchmark_runner_group_member_id }}/${{ inputs.benchmark_runner_group_total }}) filter=${{ inputs.benchmark_glob }}"
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash -l -eo pipefail {0}
    permissions:
      contents: read
    steps:
      # Generate repo App token
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GH_CI_APP_ID }}
          private-key: ${{ secrets.GH_CI_PRIVATE_KEY }}
          owner: redislabsdev
          repositories: |
            Redis
            RediSearchDisk
            rust-speedb
            speedb-ent

      # Full checkout (submodules) similar to RS
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Install build dependencies
        working-directory: deps/RediSearch/.install
        run: ./install_script.sh sudo

      - name: Setup tests dependencies
        working-directory: deps/RediSearch/
        run: .install/test_deps/common_installations.sh sudo

      - name: Install speedb related packages (for async API enablement)
        run: |
          sudo apt install -y liburing-dev

      - name: Build RediSearchDisk module
        run: PROFILE=Release ./build.sh build

      - name: Install Python dependencies
        run: |
          pip3 install --upgrade pip
          python3 -m pip install -r deps/RediSearch/tests/benchmarks/requirements.txt

      # Checkout private fork big redis branch
      - name: Checkout Redis with the app token
        uses: actions/checkout@v4
        with:
          repository: redislabsdev/Redis
          path: redis
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1
          ref: RediSearchDisk
          submodules: recursive

      # Build and install Redis
      - name: Build Redis (install)
        working-directory: redis
        run: |
          sudo make install \
            BUILD_TLS=yes \
            SANITIZER=${{ env.SAN }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.11.1
          terraform_wrapper: false

      - name: Prepare RedisJSON Module
        run: REJSON_BRANCH=${{ inputs.rejson_branch }} ./deps/RediSearch/tests/deps/setup_rejson.sh

      - name: Run CI benchmarks on aws for envs ${{ inputs.allowed_envs }}
        timeout-minutes: 240
        working-directory: benchmarks
        env:
          PERF_CALLGRAPH_MODE: dwarf
          MAX_PROFILERS: 3
          AWS_ACCESS_KEY_ID: ${{ secrets.PERFORMANCE_EC2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PERFORMANCE_EC2_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.PERFORMANCE_EC2_REGION }}
          EC2_PRIVATE_PEM: ${{ secrets.PERFORMANCE_EC2_PRIVATE_PEM }}
          PROFILE: ${{ inputs.profile_env }}
          BENCHMARK_GLOB: ${{ inputs.benchmark_glob }}
          BENCHMARK_RUNNER_GROUP_M_ID: ${{ inputs.benchmark_runner_group_member_id }}
          BENCHMARK_RUNNER_GROUP_TOTAL: ${{ inputs.benchmark_runner_group_total }}
        run: |
          redisbench-admin run-remote \
            --module_path ../${{ inputs.module_path }} \
            --required-module search \
            --github_actor ${{ github.triggering_actor }} \
            --github_repo ${{ github.event.repository.name }} \
            --github_org ${{ github.repository_owner }} \
            --module_path ../${{ inputs.rejson_module_path }} \
            --required-module ReJSON \
            --github_sha ${{ github.sha }} \
            --github_branch ${{ github.head_ref || github.ref_name }} \
            --upload_results_s3 \
            --triggering_env ${{ inputs.triggering_env }} \
            --allowed-envs ${{ inputs.allowed_envs }} \
            --allowed-setups ${{ inputs.allowed_setups }} \
            --push_results_redistimeseries \
            --redistimeseries_host ${{ secrets.PERFORMANCE_RTS_HOST }} \
            --redistimeseries_port ${{ secrets.PERFORMANCE_RTS_PORT }} \
            --redistimeseries_pass '${{ secrets.PERFORMANCE_RTS_AUTH }}'

      - name: Generate Pull Request Performance info
        if: github.event.number
        env:
          PERFORMANCE_GH_TOKEN: ${{ secrets.PERFORMANCE_GH_TOKEN }}
          PERFORMANCE_WH_TOKEN: ${{ secrets.PERFORMANCE_WH_TOKEN }}
        run: |
          redisbench-admin compare \
            --defaults_filename ./benchmarks/defaults.yml \
            --comparison-branch ${{ github.event.pull_request.head.ref || github.ref_name }} \
            --baseline-branch ${{ github.event.pull_request.base.ref }} \
            --auto-approve \
            --pull-request ${{ github.event.number }} \
            --redistimeseries_host ${{ secrets.PERFORMANCE_RTS_HOST }} \
            --redistimeseries_port ${{ secrets.PERFORMANCE_RTS_PORT }} \
            --redistimeseries_pass '${{ secrets.PERFORMANCE_RTS_AUTH }}'
