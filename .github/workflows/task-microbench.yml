name: Micro Benchmarks

on:
  workflow_call:

jobs:
  run-benchmarks:
    uses: ./.github/workflows/benchmark-reusable.yml
    with:
      candidate-name: 'current'
      baseline-name: 'main'
      fail-on-regression: true
      save-baseline: false
      comparison-title: 'Benchmark Comparison'
      skip-secrets-check: false
    secrets: inherit


