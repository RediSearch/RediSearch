name: Retry Command
description: |
  Runs a command with retry logic. Retries up to 5 times with 30 second delays.

inputs:
  command:
    description: "The command to run"
    required: true
  working_directory:
    description: "Working directory to run the command from"
    required: false
    default: "."
  max_retries:
    description: "Maximum number of retry attempts"
    required: false
    default: "5"
  retry_delay:
    description: "Delay in seconds between retries"
    required: false
    default: "30"
  github_token:
    description: |
      Optional token exposed to the command as GITHUB_TOKEN (e.g. so
      cargo-binstall makes authenticated GitHub API calls). Scoped to this
      step only; leave unset to expose no token.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - shell: bash -l -eo pipefail {0}
      working-directory: ${{ inputs.working_directory }}
      env:
        COMMAND: ${{ inputs.command }}
        MAX_RETRIES: ${{ inputs.max_retries }}
        RETRY_DELAY: ${{ inputs.retry_delay }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        # Only export the token when provided, so callers that don't pass one
        # (and the empty default) don't get a bogus empty GITHUB_TOKEN.
        if [ -n "$INPUT_GITHUB_TOKEN" ]; then
          export GITHUB_TOKEN="$INPUT_GITHUB_TOKEN"
        fi
        SUCCESS=0
        for i in $(seq 1 "$MAX_RETRIES"); do
          echo "Attempt $i of $MAX_RETRIES"
          if eval "$COMMAND"; then
            echo "Command succeeded"
            SUCCESS=1
            break
          fi
          if [ "$i" -lt "$MAX_RETRIES" ]; then
            echo "Command failed, retrying in $RETRY_DELAY seconds..."
            sleep "$RETRY_DELAY"
          fi
        done
        [ $SUCCESS -eq 1 ] || exit 1
