name: Fix HOME Directory
description: |
  Fixes HOME environment variable when running in containers.
  GitHub Actions runner overrides HOME to a workspace-specific path,
  which breaks tools expecting HOME to match /etc/passwd.
  See: https://github.com/actions/runner/issues/863

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        h=$(getent passwd "$(id -un)" | cut -d: -f6)
        if [ "$h" = "$HOME" ]; then
          echo "HOME fine: $HOME"
          exit 0
        fi
        echo "HOME=$HOME was broken. Setting it to $h"
        ls -ld "$HOME"
        ls -ld "$h"
        echo "USER: $USER"
        echo "id: $(id)"
        echo "HOME=$h" >> "$GITHUB_ENV"

