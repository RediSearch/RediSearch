name: Codex CI Triage
description: >
  Run Codex CLI to analyze CI failures and expose the result as outputs that can
  be embedded into notifications (Slack, PR comments). Codex failures never fail
  the calling job.

inputs:
  openai-api-key:
    description: OpenAI API key for Codex.
    required: true
  prompt-file:
    description: Path to the Codex prompt file (markdown).
    required: true
  working-directory:
    description: Working directory for Codex execution.
    required: false
    default: .

outputs:
  triage-exists:
    description: "true if Codex produced a non-empty triage output, false otherwise."
    value: ${{ steps.read.outputs.triage_exists }}
  triage-content:
    description: Raw triage text (multiline). Empty when triage-exists is false.
    value: ${{ steps.read.outputs.triage_content }}
  triage-content-json:
    description: JSON-escaped triage text suitable for direct embedding into a JSON payload.
    value: ${{ steps.read.outputs.triage_content_json }}

runs:
  using: composite
  steps:
    - name: Run Codex
      id: codex
      continue-on-error: true
      uses: openai/codex-action@v1
      with:
        openai-api-key: ${{ inputs.openai-api-key }}
        prompt-file: ${{ inputs.prompt-file }}
        working-directory: ${{ inputs.working-directory }}
        sandbox: read-only
        # `drop-sudo` keeps the read-only sandbox but also drops sudo capabilities
        # from the Codex subprocess. Required when CI logs (which Codex reads)
        # carry attacker-controlled content — for fork-PR triage especially — so a
        # prompt injection in the logs cannot escalate to running privileged
        # commands and exfiltrating `CI_TRIAGE_OPENAI_API_KEY`.
        safety-strategy: drop-sudo
        # Triage runs on post-merge/scheduled events whose actor is a bot
        # (github-merge-queue, github-actions[bot]); allow them past the
        # action's collaborator gate. Sandbox + safety remain read-only.
        # `allow-bots: true` only covers github-actions[bot] (hardcoded in
        # codex-action's trusted set). For merge-queue, `github.actor`
        # differs by event: `push` runs see `github-merge-queue[bot]`,
        # but `schedule` runs see the bare `github-merge-queue`. The
        # action's `isBotActor` check (endsWith "[bot]") rejects the
        # bare form and never consults `allow-bot-users`, so we list
        # the bare form under `allow-users` and the suffixed form under
        # `allow-bot-users`.
        allow-bots: true
        allow-users: github-merge-queue
        allow-bot-users: github-merge-queue[bot]

    - name: Read triage output
      id: read
      shell: bash
      # Read codex's `final-message` step output rather than a workspace file:
      # under `sandbox: read-only` the workspace is mounted read-only, so any
      # `--output-last-message` write into it is silently dropped. `final-message`
      # is populated from a temp file the action creates outside the workspace.
      env:
        TRIAGE_CODEX_OUTCOME: ${{ steps.codex.outcome }}
        TRIAGE_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
      run: |
        if [ "$TRIAGE_CODEX_OUTCOME" != "success" ]; then
          echo "triage_exists=false" >> "$GITHUB_OUTPUT"
          echo "⚠️ Codex triage step did not succeed (outcome=${TRIAGE_CODEX_OUTCOME})"
          exit 0
        fi
        if [ -z "$TRIAGE_FINAL_MESSAGE" ]; then
          echo "triage_exists=false" >> "$GITHUB_OUTPUT"
          echo "⚠️ Codex triage succeeded but produced no final-message output"
          exit 0
        fi
        echo "triage_exists=true" >> "$GITHUB_OUTPUT"
        {
          echo "triage_content<<__EOF__"
          printf '%s\n' "$TRIAGE_FINAL_MESSAGE"
          echo "__EOF__"
        } >> "$GITHUB_OUTPUT"
        {
          echo "triage_content_json<<__EOF__"
          printf '%s' "$TRIAGE_FINAL_MESSAGE" | jq -Rs .
          echo "__EOF__"
        } >> "$GITHUB_OUTPUT"
