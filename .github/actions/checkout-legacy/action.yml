name: Checkout (Legacy)
description: |
  Manual git checkout for platforms that don't support node20 (e.g., amazonlinux:2).
  Falls back to manual git operations when actions/checkout@v4 isn't available.

inputs:
  ref:
    description: "Git ref to checkout"
    required: true
  repository:
    description: "Repository to checkout (owner/repo format)"
    required: false
    default: ${{ github.repository }}
  submodules:
    description: "Whether to checkout submodules"
    required: false
    default: "true"
  token:
    description: "GitHub token for private repos"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GIT_REF: ${{ inputs.ref }}
        GITHUB_REPO: ${{ inputs.repository }}
        GITHUB_TOKEN: ${{ inputs.token }}
        CHECKOUT_SUBMODULES: ${{ inputs.submodules }}
      run: |
        # Configure the safe directory
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git config --global --add safe.directory "/__w/$GITHUB_REPO"

        # Build repo URL (with or without token)
        if [ -n "$GITHUB_TOKEN" ]; then
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git"
        else
          REPO_URL="https://github.com/${GITHUB_REPO}.git"
        fi

        # Initialize a Git repository
        git init
        git remote add origin "$REPO_URL"

        # Fetch and checkout ref
        git fetch origin "$GIT_REF" || {
          echo "Failed to fetch ref: '$GIT_REF'";
          exit 1;
        }
        git checkout FETCH_HEAD

        # Update submodules if requested
        if [ "$CHECKOUT_SUBMODULES" = "true" ]; then
          git submodule update --init --recursive
        fi

