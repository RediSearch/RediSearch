[package]
name = "ttl_table_bencher"
version.workspace = true
edition.workspace = true
license-file.workspace = true
publish.workspace = true

[lints]
workspace = true

[lib]
# See https://bheisler.github.io/criterion.rs/book/faq.html#cargo-bench-gives-unrecognized-option-errors-for-valid-command-line-options
bench = false

[[bench]]
name = "operations"
harness = false

[build-dependencies]
bindgen.workspace = true
build_utils = { path = "../build_utils" }

[dependencies]
criterion.workspace = true
ffi.workspace = true
field.workspace = true
libc.workspace = true
redis_mock.workspace = true
thin_vec.workspace = true
ttl_table.workspace = true
ttl_table_2.workspace = true
workspace_hack.workspace = true

# Crate required to invoke C symbols
redisearch_rs = { path = "../c_entrypoint/redisearch_rs", features = ["mock_allocator"] }
