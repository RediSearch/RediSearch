[package]
name = "ttl_table_bencher"
version.workspace = true
edition.workspace = true
license-file.workspace = true
publish.workspace = true

[lib]
# See https://bheisler.github.io/criterion.rs/book/faq.html#cargo-bench-gives-unrecognized-option-errors-for-valid-command-line-options
bench = false

[[bench]]
name = "add"
harness = false

[[bench]]
name = "field_satisfies_predicate"
harness = false

[[bench]]
name = "field_mask_satisfies_predicate"
harness = false

[build-dependencies]
build_utils = { path = "../build_utils" }

[dependencies]
criterion.workspace = true
ffi.workspace = true
libc.workspace = true
rand.workspace = true
redis_mock.workspace = true
rqe_core.workspace = true
thin_vec.workspace = true
ttl_table = { workspace = true, features = ["test-utils"] }
workspace_hack.workspace = true

# Crate required to invoke C symbols
redisearch_rs = { path = "../c_entrypoint/redisearch_rs", features = ["mock_allocator"] }

[lints]
workspace = true
