[package]
name = "rqe_wildcard"
version.workspace = true
edition.workspace = true
license-file.workspace = true
publish.workspace = true

[features]
# feature enabled when building tests so they can link the C code in build.rs
# see https://github.com/rust-lang/cargo/issues/4789#issuecomment-2308131243
unittest = ["ffi"]

[lib]
# See https://bheisler.github.io/criterion.rs/book/faq.html#cargo-bench-gives-unrecognized-option-errors-for-valid-command-line-options
bench = false

[[bench]]
name = "matching"
harness = false

[lints]
workspace = true

[build-dependencies]
build_utils.workspace = true

[dependencies]
ffi = { workspace = true, optional = true }
memchr.workspace = true
workspace_hack.workspace = true

[dev-dependencies]
criterion.workspace = true
proptest = { workspace = true, features = ["std"] }
rqe_wildcard = { path = ".", features = ["unittest"] }
wildcard_cloudflare.workspace = true
