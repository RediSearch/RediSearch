language = "C"
autogen_warning = "/* Warning, this file is autogenerated by cbindgen from `src/redisearch_rs/c_entrypoint/fork_gc_ffi/build.rs`. Don't modify it manually. */"
cpp_compat = true
pragma_once = true
usize_is_size_t = true

# This header is included from `src/fork_gc.h` *after* `ForkGC` is defined,
# so we don't pull in any C headers here — that would be circular.

[export]
# `ForkGC` is a C type defined in `fork_gc.h`; don't emit a forward
# declaration for it.
exclude = ["ForkGC"]

[fn]
# Map Rust's `#[must_use]` to the GCC/Clang warn_unused_result attribute
# so C call sites get the same warning as the original C code.
must_use = "__attribute__((warn_unused_result))"
