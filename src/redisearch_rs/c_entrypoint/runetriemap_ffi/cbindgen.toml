language = "C"
sys_includes = ["stddef.h", "stdint.h", "stdbool.h", "time.h"]
includes = ["redismodule.h"]
autogen_warning = "/* Warning, this file is autogenerated by cbindgen from `src/redisearch_rs/c_entrypoint/runetriemap_ffi/build.rs. Don't modify it manually. */"
cpp_compat = true
pragma_once = true

# Forward-declare the opaque RuneTrieMap type (defined in trie_rs::opaque,
# which cbindgen cannot parse due to advanced syntax in trie_rs).
after_includes = """
/**
 * Opaque type RuneTrieMap. Can be instantiated with [`RuneTrieMap_New`].
 */
typedef struct RuneTrieMap RuneTrieMap;
/**
 * 16-bit rune code point used as the key element of [`RuneTrieMap`].
 *
 * Mirrors the `rune` typedef in `src/trie/rune_util.h`.
 */
typedef uint16_t rune;
"""

[parse]
parse_deps = true
include = ["libc"]

[export]
# RuneTrieMap is forward-declared manually via after_includes; rune is
# typedef'd manually so it stays compatible with the existing C alias.
# strToRunesN / runesToStr are imported from `src/trie/rune_util.h`;
# emitting them again would duplicate the declarations.
exclude = ["RuneTrieMap", "rune", "strToRunesN", "runesToStr"]

[export.rename]
# Workaround for https://github.com/mozilla/cbindgen/issues/539
"timespec" = "struct timespec"
"RedisModuleIO" = "struct RedisModuleIO"
