[package]
name = "reducers_ffi"
version.workspace = true
edition.workspace = true
license-file.workspace = true
publish.workspace = true

[lib]
# This crate has no tests nor benches.
# Compiling a no-op bench/test binary can cause linking issues with C.
test = false
bench = false

[lints]
workspace = true

[features]
# Passthrough for work-in-progress reducers. Off by default.
wip_features = ["reducers/wip_features"]

[dependencies]
ffi.workspace = true
query_error.workspace = true
reducers.workspace = true
rlookup.workspace = true
value.workspace = true
workspace_hack.workspace = true
