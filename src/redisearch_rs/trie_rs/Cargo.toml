[package]
name = "trie_rs"
version.workspace = true
edition.workspace = true
license.workspace = true

[lints]
workspace = true

[lib]
crate-type = ["staticlib", "rlib"]

[features]
default = ["ffi"] # TODO remove
redis_allocator = ["dep:redis-module"]
test_allocator = ["dep:redis_module_test"] # TODO isolate ffi in different crate
ffi = ["dep:memchr"]

[dependencies]
lending-iterator.workspace = true
libc.workspace = true
low_memory_thin_vec.workspace = true
memchr = { workspace = true, optional = true }
redis-module = { workspace = true, optional = true }
redis_module_test = { workspace = true, optional = true }

[dev-dependencies]
insta.workspace = true
proptest = { workspace = true, features = ["std"] }
proptest-derive.workspace = true
trie_rs.workspace = true
fs-err.workspace = true
