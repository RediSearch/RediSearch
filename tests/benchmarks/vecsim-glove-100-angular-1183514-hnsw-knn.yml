version: 0.5
name: "vecsim-glove-100-angular-1183514-hnsw-knn"
description: >-
  Pure HNSW KNN server benchmark over 1,183,514 real 100-dimensional GloVe
  embeddings. Each request uses one of 10,000 real ANN-Benchmarks query vectors.
  Reports query throughput and latency along with build.vector_index_sz_mb, which
  makes HNSW per-node memory changes visible at realistic scale.

metadata:
  component: "vecsim"
  dataset: "ANN-Benchmarks glove-100-angular"
  doc_count: 1183514
  dimension: 100
  data_type: "FLOAT32"
  distance_metric: "COSINE"
  algorithm: "HNSW"
  query_type: "KNN"

timeout_seconds: 7200
dataset_load_timeout_secs: 5400

setups:
  - oss-standalone
  - oss-standalone-threads-6

dbconfig:
  - dataset_name: "glove-100-angular-1183514-hnsw"
  - init_commands:
    - 'FT.CREATE idx ON HASH PREFIX 1 glove-100-angular-1183514: SCHEMA vector VECTOR HNSW 14 TYPE FLOAT32 DIM 100 DISTANCE_METRIC COSINE M 36 EF_CONSTRUCTION 250 EF_RUNTIME 300 INITIAL_CAP 1183514'
  - tool: ftsb_redisearch
  - parameters:
    - workers: 16
    - reporting-period: 5s
    - input: "https://s3.amazonaws.com/benchmarks.redislabs/redisearch/datasets/glove-100-angular-1183514/glove-100-angular-1183514.redisearch.commands.SETUP.csv"
    - max-token-size-mb: 1
  - check:
      keyspacelen: 1183514

clientconfig:
  - benchmark_type: "read-only"
  - tool: ftsb_redisearch
  - parameters:
    - workers: 8
    - requests: 10000
    - reporting-period: 1s
    - input: "https://s3.amazonaws.com/benchmarks.redislabs/redisearch/datasets/glove-100-angular-1183514/glove-100-angular-1183514.redisearch.commands.BENCH.KNN.csv"
    - max-token-size-mb: 1
