version: 0.5
name: "search-msmarco-6M-documents-mixed-50-50-lockfree"
description: |
  MS MARCO 6M documents - mixed 50/50 read/write benchmark, with the inverted-index
  lock-free-read snapshot path ENABLED (_LOCK_FREE_READS on).

  Feature-branch variant of search-msmarco-6M-documents-mixed-50-50: identical load,
  but sets `search-_lock-free-reads true` so query iteration releases the spec read
  lock per result (reading from the owned snapshot) instead of holding it for the
  whole read. Compare against:
    - master (search-msmarco-6M-documents-mixed-50-50, no such config) → lock-based.
    - feature flag-off (same file, flag default off) → snapshot capture cost (C1)
      without the lock-free benefit.
  This variant isolates the concurrency win (writer progress under mixed load) plus
  the COW/GC cost (C2/C3) when GC overlaps live readers.

metadata:
  component: "search"
  dataset: "MS MARCO document-v2"
  doc_count: 6000000
  query_type: "mixed"
  use_case: "Concurrent read/write under snapshot COW with lock-free reads enabled"

timeout_seconds: 3600
dataset_load_timeout_secs: 3600

setups:
  - oss-cluster-08-primaries-250gb-threads-8

remote:
  - setup: redisearch-msmarco

dbconfig:
  - dataset_name: "6M-msmarco-documents"
  # Apply on EVERY cluster primary at module load. A runtime `CONFIG SET` is
  # node-local in a Redis Cluster (not broadcast; FT.CONFIG unavailable in cluster
  # mode), so it would force GC — and, critically, enable lock-free reads — on only
  # 1 of 8 primaries, leaving the other 7 lock-based and defeating the comparison.
  - module-configuration-parameters:
      redisearch:
        FORK_GC_RUN_INTERVAL: 1
        FORK_GC_CLEAN_THRESHOLD: 1
        _LOCK_FREE_READS: "true"
      module-oss:
        FORK_GC_RUN_INTERVAL: 1
        FORK_GC_CLEAN_THRESHOLD: 1
        _LOCK_FREE_READS: "true"
  - init_commands:
    - '"FT.CREATE" "ms_marco_idx" "ON" "HASH" "PREFIX" "1" "doc:" "SCHEMA" "url" "TEXT" "title" "TEXT" "WEIGHT" "2.0" "headings" "TEXT" "WEIGHT" "1.5" "body" "TEXT" "tags" "TAG" "SEPARATOR" ","'
  - tool: ftsb_redisearch
  - parameters:
    - workers: 64
    - reporting-period: 5s
    - max-token-size-mb: 10
    - input: "s3://benchmarks.redislabs/redisearch/datasets/6M-msmarco-documents/6M-msmarco-documents.redisearch.commands.SETUP.csv"
  - check:
      keyspacelen: 5978761

clientconfig:
  benchmark_type: "mixed"
  tool: memtier_benchmark
  arguments: "--test-time 180 -c 16 -t 16 --hide-histogram --key-prefix 'doc:' --key-minimum 1 --key-maximum 5900000 --command 'HSET __key__ body __data__' --command-ratio 1 --command 'FT.SEARCH ms_marco_idx information --limit 0 10' --command-ratio 1"
