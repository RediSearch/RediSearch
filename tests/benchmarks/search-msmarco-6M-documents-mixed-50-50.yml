version: 0.5
name: "search-msmarco-6M-documents-mixed-50-50"
description: |
  MS MARCO 6M documents - mixed 50/50 read/write benchmark.

  Purpose: measure the inverted-index lock-free-read / copy-on-write snapshot
  under concurrent read+write load, comparing master (read lock held for the whole
  query) against the snapshot branch (lock held only for capture).

  Design (scan-heavy mixed): reads are FT.AGGREGATE ... GROUPBY 0 REDUCE COUNT 0,
  not FT.SEARCH. In an OSS cluster the coordinator drives each shard with
  FT.AGGREGATE ... WITHCURSOR (see src/coord/dist_aggregate.c), so the shard-side
  iterator holds its inverted-index SNAPSHOT for the whole scan — the window where
  the COW cost (deep-copy of pinned blocks, ~2x retention) actually materializes; a
  top-N FT.SEARCH captures and drops its snapshot in milliseconds and never overlaps
  a GC cycle. COUNT forces a full server-side scan of the `information` posting list
  yet returns a single row, so throughput is not dominated by reply size. On master
  (this branch) the read lock is held for the whole scan, so HSET writers block on
  the reader — the baseline the snapshot branch is compared against.

  Writes (HSET body=information tags=<random>) deliberately target the SAME term the
  reads scan: `body information` places every hot doc in the `information` inverted
  index, and the random `tags` value guarantees the document content changes on every
  write so it is genuinely re-indexed. That churns the exact posting list the reader
  pinned, so a low fork-GC interval + clean threshold reclaim superseded blocks while
  a reader holds them (deep-copied on the snapshot branch). A bounded 1M-key hot set
  keeps the churn focused instead of inflating the corpus. NOTE: writes use synthetic
  doc:<n> keys (not the loaded doc:<msmarco_docid> keys), which is intentional here —
  the goal is read/write contention on one II, which memtier's numeric key range
  cannot express against the corpus's arbitrary string doc IDs.

metadata:
  component: "search"
  dataset: "MS MARCO document-v2"
  doc_count: 6000000
  query_type: "mixed"
  use_case: "Concurrent read/write throughput, latency, and memory under snapshot COW"

timeout_seconds: 3600
dataset_load_timeout_secs: 3600

setups:
  - oss-cluster-08-primaries-250gb-threads-8

remote:
  - setup: redisearch-msmarco

dbconfig:
  - dataset_name: "6M-msmarco-documents"
  # Force aggressive fork-GC on EVERY cluster primary via module load-time config.
  # A runtime `CONFIG SET` only reconfigures the single node it is sent to (Redis
  # Cluster does not broadcast CONFIG, and FT.CONFIG is not registered in cluster
  # mode), which would leave 7/8 primaries at the default GC cadence and
  # under-measure the COW/GC pressure this benchmark is meant to exercise.
  - module-configuration-parameters:
      redisearch:
        FORK_GC_RUN_INTERVAL: 1
        FORK_GC_CLEAN_THRESHOLD: 1
      module-oss:
        FORK_GC_RUN_INTERVAL: 1
        FORK_GC_CLEAN_THRESHOLD: 1
  - init_commands:
    - '"FT.CREATE" "ms_marco_idx" "ON" "HASH" "PREFIX" "1" "doc:" "SCHEMA" "url" "TEXT" "title" "TEXT" "WEIGHT" "2.0" "headings" "TEXT" "WEIGHT" "1.5" "body" "TEXT" "tags" "TAG" "SEPARATOR" ","'
  - tool: ftsb_redisearch
  - parameters:
    - workers: 64
    - reporting-period: 5s
    - max-token-size-mb: 10
    - input: "s3://benchmarks.redislabs/redisearch/datasets/6M-msmarco-documents/6M-msmarco-documents.redisearch.commands.SETUP.csv"
  - check:
      keyspacelen: 5978761

clientconfig:
  benchmark_type: "mixed"
  tool: memtier_benchmark
  arguments: "--test-time 180 -c 16 -t 16 --hide-histogram --key-prefix 'doc:' --key-minimum 1 --key-maximum 1000000 --command 'HSET __key__ body information tags __data__' --command-ratio 1 --command 'FT.AGGREGATE ms_marco_idx information GROUPBY 0 REDUCE COUNT 0 AS n' --command-ratio 1"
